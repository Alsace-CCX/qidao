<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #0a0a10 0%, #121220 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: serif;
            color: #e0e0e0;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 语言选择器 —— 纯黑色底色 */
        .lang-select {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 12px;
            background: #000; /* 纯黑底色 */
            border: 1px solid rgba(255,255,240,0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            z-index: 10;
        }

        /* 下拉菜单选项也改成黑色 */
        .lang-select option {
            background: #000;
            color: #fff;
        }

        /* 神圣光晕背景 */
        .holy-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,240,0.08) 0%, transparent 60%);
            animation: glow 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes glow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.15); opacity: 0.8; }
        }

        /* 核心文字 */
        .prayer-text {
            font-size: 42px;
            letter-spacing: 8px;
            margin-bottom: 30px;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255,255,230,0.3);
        }

        /* 分隔线 */
        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,240,0.4), transparent);
            margin: 20px 0;
            z-index: 1;
        }

        /* 通用祈祷语 */
        .universal {
            font-size: 18px;
            opacity: 0.85;
            letter-spacing: 2px;
            z-index: 1;
            max-width: 90%;
            margin-bottom: 40px;
        }

        /* 静谧动画 */
        @keyframes fade {
            0%,100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .fade {
            animation: fade 6s ease-in-out infinite;
        }

        /* 祈祷输入区域 */
        .prayer-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 480px;
            z-index: 1;
        }

        .prayer-input {
            width: 100%;
            min-height: 120px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,240,0.2);
            border-radius: 8px;
            color: #f0f0e0;
            font-size: 16px;
            font-family: serif;
            resize: none;
            outline: none;
            text-align: center;
            line-height: 1.6;
        }

        .prayer-input::placeholder {
            color: rgba(255,255,240,0.4);
        }

        .prayer-input:focus {
            border-color: rgba(255,255,240,0.5);
            background: rgba(255,255,255,0.08);
        }

        .submit-btn {
            padding: 14px;
            background: rgba(255,255,240,0.15);
            border: 1px solid rgba(255,255,240,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: rgba(255,255,240,0.25);
            transform: translateY(-2px);
        }

        /* 🔥 黑客帝国代码雨效果 - 祈愿文字 */
        .matrix-prayer {
            position: absolute;
            color: rgba(255, 255, 240, 0.5);
            font-size: 18px;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            z-index: 0;
            animation: matrix-fall linear infinite;
            writing-mode: vertical-rl; /* 竖排文字，更像代码雨 */
            text-orientation: upright;
        }

        /* 🔥 从上往下滚动动画 */
        @keyframes matrix-fall {
            0% {
                top: -10%;
                opacity: 0.5;
            }
            100% {
                top: 110%;
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <!-- 全球语言选择器 -->
    <select class="lang-select" id="langSelect" onchange="changeLanguage()">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="pt">Português</option>
        <option value="it">Italiano</option>
    </select>

    <div class="holy-light"></div>
    <div class="prayer-text fade" id="title">祈愿</div>
    <div class="divider"></div>
    <div class="universal" id="universal">和平 · 希望 · 信仰 · 爱</div>

    <form class="prayer-form">
        <textarea class="prayer-input" id="inputBox" placeholder="在此写下你的祈愿…" maxlength="20"></textarea>
        <button type="button" class="submit-btn" id="submitBtn" onclick="sendPrayer()">献上祈愿</button>
    </form>

    <script>
        // 全球多语言配置（全部简体中文）
        const langData = {
            zh: {
                title: "祈愿",
                universal: "和平 · 希望 · 信仰 · 爱",
                placeholder: "在此写下你的祈愿…",
                button: "献上祈愿",
                pageTitle: "祈"
            },
            en: {
                title: "Prayer",
                universal: "Peace · Hope · Faith · Love",
                placeholder: "Write your prayer here...",
                button: "Offer Prayer",
                pageTitle: "Prayer"
            },
            ja: {
                title: "祈り",
                universal: "へいわ・ねがい・しんねん・愛",
                placeholder: "ここに祈りを書きます…",
                button: "祈りをささげる",
                pageTitle: "祈り"
            },
            ko: {
                title: "기도",
                universal: "평화 · 희망 · 신념 · 사랑",
                placeholder: "기도를 여기에 적어주세요…",
                button: "기도 드리기",
                pageTitle: "기도"
            },
            es: {
                title: "Oración",
                universal: "Paz · Esperanza · Fe · Amor",
                placeholder: "Escribe tu oración aquí...",
                button: "Ofrecer Oración",
                pageTitle: "Oración"
            },
            fr: {
                title: "Prière",
                universal: "Paix · Espoir · Foi · Amour",
                placeholder: "Écrivez votre prière ici...",
                button: "Offrir la Prière",
                pageTitle: "Prière"
            },
            de: {
                title: "Gebet",
                universal: "Frieden · Hoffnung · Glaube · Liebe",
                placeholder: "Schreibe dein Gebet hier...",
                button: "Gebet Darreichen",
                pageTitle: "Gebet"
            },
            ru: {
                title: "Молитва",
                universal: "Мир · Надежда · Вера · Любовь",
                placeholder: "Напишите свою молитву здесь...",
                button: "Предложить Молитву",
                pageTitle: "Молитва"
            },
            ar: {
                title: "دعاء",
                universal: "سلام · أمل · إيمان · حب",
                placeholder: "اكتب دعائك هنا...",
                button: "أقدم الدعاء",
                pageTitle: "دعاء"
            },
            hi: {
                title: "प्रार्थना",
                universal: "शांति · आशा · विश्वास · प्रेम",
                placeholder: "यहां अपनी प्रार्थना लिखें...",
                button: "प्रार्थना अर्पित करें",
                pageTitle: "प्रार्थना"
            },
            pt: {
                title: "Oração",
                universal: "Paz · Esperança · Fé · Amor",
                placeholder: "Escreva sua oração aqui...",
                button: "Oferecer Oração",
                pageTitle: "Oração"
            },
            it: {
                title: "Preghiera",
                universal: "Pace · Speranza · Fede · Amore",
                placeholder: "Scrivi la tua preghiera qui...",
                button: "Offri Preghiera",
                pageTitle: "Preghiera"
            }
        };

        // 切换语言
        function changeLanguage() {
            const lang = document.getElementById("langSelect").value;
            const data = langData[lang];
            
            document.getElementById("title").innerText = data.title;
            document.getElementById("universal").innerText = data.universal;
            document.getElementById("inputBox").placeholder = data.placeholder;
            document.getElementById("submitBtn").innerText = data.button;
            document.title = data.pageTitle;
        }

        // 🔥 提交祈愿 - 黑客帝国代码雨效果
        function sendPrayer() {
            const input = document.getElementById("inputBox");
            const text = input.value.trim();
            
            if (!text) return;
            input.value = '';

            // 创建祈愿文字
            const el = document.createElement('div');
            el.className = 'matrix-prayer';
            el.innerText = text;

            // 🔥 随机不同列（X轴），顶部出现
            const randomX = Math.random() * window.innerWidth;
            el.style.left = randomX + 'px';
            el.style.top = '-10%';

            // 🔥 随机下落速度（更自然）
            const fallSpeed = Math.random() * 8 + 6;
            el.style.animationDuration = fallSpeed + 's';

            document.body.appendChild(el);

            // 3分钟后消失
            setTimeout(() => {
                el.remove();
            }, 180000);
        }

        // 回车触发提交
        document.getElementById('inputBox').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendPrayer();
            }
        });
    </script>
</body>
</html>
